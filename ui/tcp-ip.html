<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TCP/IP — QA Internship</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f5f5f5; font-family: Arial, sans-serif; }
        button { cursor: pointer; transition: opacity 0.15s; }
        button:hover { opacity: 0.85; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState } = React;

    const GREEN = "#1a5c35";
    const GREEN_LIGHT = "#e8f5ee";
    const BLUE = "#185FA5";
    const BLUE_LIGHT = "#e6f1fb";
    const AMBER = "#854f0b";
    const AMBER_LIGHT = "#faeeda";
    const RED = "#a32d2d";
    const RED_LIGHT = "#fcebeb";
    const PURPLE = "#5b21b6";
    const PURPLE_LIGHT = "#ede9fe";
    const GRAY = "#444";
    const BORDER = "#ddd";

    const tabs = ["4-Layer Model", "IPv4 vs IPv6", "TCP vs UDP", "3-Way Handshake", "DNS Lookup", "How Packets Work"];

    function Section({ title, color = GREEN, children }) {
        return (
            <div style={{ marginBottom: 28 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                    <div style={{ width: 4, height: 20, background: color, borderRadius: 2 }} />
                    <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color, fontFamily: "Georgia, serif" }}>{title}</h3>
                </div>
                {children}
            </div>
        );
    }

    function FourLayers() {
        const layers = [
            {
                num: 4, name: "Application Layer", color: BLUE, bg: BLUE_LIGHT,
                protocols: ["HTTP / HTTPS", "DNS", "FTP", "SMTP / IMAP", "SSH", "WebSocket"],
                desc: "Closest to the user. Defines how apps format and exchange data. This is where your code lives.",
                pdu: "Data / Message",
                analogy: "The letter you write — the actual content"
            },
            {
                num: 3, name: "Transport Layer", color: GREEN, bg: GREEN_LIGHT,
                protocols: ["TCP (reliable)", "UDP (fast, no guarantee)"],
                desc: "Breaks data into segments. TCP ensures delivery and order. UDP just sends fast.",
                pdu: "Segment (TCP) / Datagram (UDP)",
                analogy: "The envelope — numbered, return address, delivery confirmation (TCP)"
            },
            {
                num: 2, name: "Internet Layer", color: AMBER, bg: AMBER_LIGHT,
                protocols: ["IPv4", "IPv6", "ICMP (ping)", "ARP"],
                desc: "Adds IP source and destination addresses. Routes packets across networks.",
                pdu: "Packet",
                analogy: "The postal system — reading addresses and choosing routes"
            },
            {
                num: 1, name: "Network Access Layer", color: PURPLE, bg: PURPLE_LIGHT,
                protocols: ["Ethernet", "Wi-Fi (802.11)", "MAC addresses", "Physical cables"],
                desc: "Transmits raw bits over the physical medium. Uses MAC addresses for local delivery.",
                pdu: "Frame / Bits",
                analogy: "The delivery truck and roads"
            },
        ];

        return (
            <div>
                <Section title="The TCP/IP 4-Layer Model">
                    <div style={{ fontSize: 12, color: GRAY, marginBottom: 16, fontFamily: "Arial, sans-serif", background: "#f9f9f9", padding: 12, borderRadius: 8, border: `1px solid ${BORDER}` }}>
                        The TCP/IP model describes how data moves from an application on one machine to an application on another. Each layer adds its own header (encapsulation) before passing data down, and strips headers (decapsulation) on the receiving side.
                    </div>

                    <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 24 }}>
                        {layers.map(layer => (
                            <div key={layer.num} style={{ background: layer.bg, border: `2px solid ${layer.color}`, borderRadius: 10, padding: 16 }}>
                                <div style={{ display: "flex", gap: 14, alignItems: "flex-start", flexWrap: "wrap" }}>
                                    <div style={{ width: 40, height: 40, borderRadius: "50%", background: layer.color, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 18, flexShrink: 0 }}>{layer.num}</div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontWeight: 700, fontSize: 14, color: layer.color, fontFamily: "Georgia, serif", marginBottom: 4 }}>{layer.name}</div>
                                        <div style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", marginBottom: 8, lineHeight: 1.5 }}>{layer.desc}</div>
                                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 6 }}>
                                            {layer.protocols.map(p => (
                                                <span key={p} style={{ fontSize: 11, background: "rgba(255,255,255,0.7)", border: `1px solid ${layer.color}`, color: layer.color, padding: "2px 8px", borderRadius: 4, fontFamily: "monospace", fontWeight: 600 }}>{p}</span>
                                            ))}
                                        </div>
                                        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", fontSize: 11, color: GRAY, fontFamily: "Arial, sans-serif" }}>
                                            <span><strong>PDU:</strong> {layer.pdu}</span>
                                            <span><strong>Analogy:</strong> {layer.analogy}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </Section>

                <Section title="Encapsulation: How Data Travels Down the Stack" color={AMBER}>
                    <div style={{ fontSize: 12, color: GRAY, marginBottom: 12, fontFamily: "Arial, sans-serif" }}>
                        When you send an HTTP request, each layer wraps the data from the layer above with its own header:
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        {[
                            { label: "App Layer adds:", content: "HTTP Header + HTTP Body (your data)", color: BLUE, bg: BLUE_LIGHT },
                            { label: "Transport Layer wraps:", content: "TCP Header + [HTTP Header + HTTP Body]", color: GREEN, bg: GREEN_LIGHT },
                            { label: "Internet Layer wraps:", content: "IP Header + [TCP Header + HTTP Header + HTTP Body]", color: AMBER, bg: AMBER_LIGHT },
                            { label: "Network Layer wraps:", content: "Frame Header + [IP Header + TCP Header + HTTP Header + Body] + Frame Trailer", color: PURPLE, bg: PURPLE_LIGHT },
                        ].map((row, i) => (
                            <div key={i} style={{ background: row.bg, border: `1px solid ${row.color}`, borderRadius: 6, padding: "10px 14px" }}>
                                <div style={{ fontSize: 11, fontWeight: 700, color: row.color, fontFamily: "Arial, sans-serif", marginBottom: 2 }}>{row.label}</div>
                                <div style={{ fontSize: 12, fontFamily: "monospace", color: "#333" }}>{row.content}</div>
                            </div>
                        ))}
                    </div>
                    <div style={{ marginTop: 10, fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", fontStyle: "italic" }}>
                        On the receiving side, each layer strips its header and passes the data up. The application sees only the original payload.
                    </div>
                </Section>

                <Section title="TCP/IP vs OSI Model" color={BLUE}>
                    <div style={{ border: `1px solid ${BORDER}`, borderRadius: 10, overflow: "hidden" }}>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", background: "#f0f0f0", borderBottom: `1px solid ${BORDER}` }}>
                            <div style={{ padding: "8px 14px", fontWeight: 700, fontSize: 12, color: BLUE, borderRight: `1px solid ${BORDER}` }}>TCP/IP (4 layers)</div>
                            <div style={{ padding: "8px 14px", fontWeight: 700, fontSize: 12, color: GREEN }}>OSI Model (7 layers)</div>
                        </div>
                        {[
                            { tcp: "Application", osi: "7. Application\n6. Presentation\n5. Session" },
                            { tcp: "Transport", osi: "4. Transport" },
                            { tcp: "Internet", osi: "3. Network" },
                            { tcp: "Network Access", osi: "2. Data Link\n1. Physical" },
                        ].map((row, i) => (
                            <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr", borderBottom: i < 3 ? `1px solid ${BORDER}` : "none", background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
                                <div style={{ padding: "10px 14px", fontSize: 12, color: BLUE, fontWeight: 600, borderRight: `1px solid ${BORDER}`, fontFamily: "Arial, sans-serif" }}>{row.tcp}</div>
                                <div style={{ padding: "10px 14px", fontSize: 11, color: GREEN, fontFamily: "monospace", whiteSpace: "pre" }}>{row.osi}</div>
                            </div>
                        ))}
                    </div>
                    <div style={{ marginTop: 10, fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif" }}>
                        OSI is a theoretical model used for teaching. TCP/IP is the practical model actually used on the Internet. In practice, people often mix terminology from both.
                    </div>
                </Section>
            </div>
        );
    }

    function IpAddressing() {
        return (
            <div>
                <Section title="IPv4 — 32-bit Addresses">
                    <div style={{ background: BLUE_LIGHT, border: `2px solid ${BLUE}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
                        <div style={{ fontWeight: 700, fontSize: 13, color: BLUE, marginBottom: 10, fontFamily: "Arial, sans-serif" }}>Format: 4 octets in decimal, separated by dots</div>
                        <div style={{ fontFamily: "monospace", fontSize: 14, background: "rgba(255,255,255,0.7)", padding: "10px 14px", borderRadius: 6, marginBottom: 10 }}>
                            192.168.1.100<br />
                            <span style={{ fontSize: 11, color: GRAY }}>= 11000000.10101000.00000001.01100100 (binary)</span>
                        </div>
                        <div style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", lineHeight: 1.6 }}>
                            Each octet is 0–255. Total address space: 2³² = ~4.3 billion addresses.<br />
                            Problem: we ran out. That's why IPv6 was created.
                        </div>
                    </div>

                    <div style={{ border: `1px solid ${BORDER}`, borderRadius: 10, overflow: "hidden", marginBottom: 16 }}>
                        <div style={{ background: "#f0f0f0", padding: "8px 14px", fontWeight: 700, fontSize: 12, color: GRAY, borderBottom: `1px solid ${BORDER}` }}>Special IPv4 Ranges</div>
                        {[
                            { range: "127.0.0.1", name: "Localhost / Loopback", use: "Your own machine. 'ping 127.0.0.1' never leaves the machine.", color: PURPLE },
                            { range: "10.0.0.0/8", name: "Private (Class A)", use: "Internal networks — not routable on public Internet", color: GREEN },
                            { range: "172.16.0.0/12", name: "Private (Class B)", use: "Internal networks — Docker uses 172.17.x.x by default", color: GREEN },
                            { range: "192.168.0.0/16", name: "Private (Class C)", use: "Home/office LANs — your router is usually 192.168.1.1", color: GREEN },
                            { range: "0.0.0.0", name: "Unspecified / Listen all", use: "Server binding to all interfaces (listen on all IPs)", color: AMBER },
                            { range: "255.255.255.255", name: "Broadcast", use: "Send to all devices on the local network", color: AMBER },
                        ].map((row, i) => (
                            <div key={i} style={{ display: "flex", gap: 12, padding: "10px 14px", borderBottom: i < 5 ? `1px solid ${BORDER}` : "none", background: i % 2 === 0 ? "#fff" : "#fafafa", alignItems: "flex-start" }}>
                                <div style={{ fontFamily: "monospace", fontSize: 12, fontWeight: 700, color: row.color, minWidth: 160 }}>{row.range}</div>
                                <div>
                                    <div style={{ fontSize: 12, fontWeight: 600, color: row.color, fontFamily: "Arial, sans-serif" }}>{row.name}</div>
                                    <div style={{ fontSize: 11, color: GRAY, fontFamily: "Arial, sans-serif", marginTop: 2 }}>{row.use}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                </Section>

                <Section title="IPv6 — 128-bit Addresses" color={GREEN}>
                    <div style={{ background: GREEN_LIGHT, border: `2px solid ${GREEN}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
                        <div style={{ fontWeight: 700, fontSize: 13, color: GREEN, marginBottom: 10, fontFamily: "Arial, sans-serif" }}>Format: 8 groups of 4 hex digits, separated by colons</div>
                        <div style={{ fontFamily: "monospace", fontSize: 13, background: "rgba(255,255,255,0.7)", padding: "10px 14px", borderRadius: 6, marginBottom: 10 }}>
                            2001:0db8:85a3:0000:0000:8a2e:0370:7334<br />
                            <span style={{ fontSize: 11, color: GREEN }}>Shortened: 2001:db8:85a3::8a2e:370:7334</span><br />
                            <span style={{ fontSize: 11, color: GRAY }}>(:: collapses consecutive groups of zeros)</span>
                        </div>
                        <div style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", lineHeight: 1.6 }}>
                            Address space: 2¹²⁸ = 340 undecillion addresses. Effectively unlimited.<br />
                            No NAT needed — every device can have a globally unique address.
                        </div>
                    </div>

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                        {[
                            { range: "::1", name: "Localhost", desc: "IPv6 equivalent of 127.0.0.1", color: PURPLE },
                            { range: "fe80::/10", name: "Link-Local", desc: "Auto-configured, not routable beyond local link", color: AMBER },
                            { range: "fc00::/7", name: "Unique Local", desc: "Private addresses, like 192.168.x.x in IPv4", color: GREEN },
                            { range: "2001:db8::/32", name: "Documentation", desc: "Reserved for examples and documentation only", color: BLUE },
                        ].map((row, i) => (
                            <div key={i} style={{ background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 8, padding: 12 }}>
                                <div style={{ fontFamily: "monospace", fontSize: 12, fontWeight: 700, color: row.color, marginBottom: 4 }}>{row.range}</div>
                                <div style={{ fontSize: 12, fontWeight: 600, color: row.color, fontFamily: "Arial, sans-serif" }}>{row.name}</div>
                                <div style={{ fontSize: 11, color: GRAY, fontFamily: "Arial, sans-serif", marginTop: 2 }}>{row.desc}</div>
                            </div>
                        ))}
                    </div>
                </Section>

                <Section title="IPv4 vs IPv6 Quick Comparison" color={AMBER}>
                    <div style={{ border: `1px solid ${BORDER}`, borderRadius: 10, overflow: "hidden" }}>
                        {[
                            { aspect: "Address size", v4: "32 bits", v6: "128 bits" },
                            { aspect: "Address space", v4: "~4.3 billion", v6: "~340 undecillion" },
                            { aspect: "Format", v4: "192.168.1.1 (decimal)", v6: "2001:db8::1 (hex)" },
                            { aspect: "NAT required?", v4: "Yes (private ranges)", v6: "No — direct global addressing" },
                            { aspect: "Header size", v4: "Variable (20–60 bytes)", v6: "Fixed 40 bytes (simpler)" },
                            { aspect: "Security", v4: "IPSec optional", v6: "IPSec built-in" },
                            { aspect: "DHCP", v4: "DHCP server needed", v6: "SLAAC — self-configuring" },
                            { aspect: "Adoption", v4: "~99% of current traffic", v6: "~40% and growing" },
                        ].map((row, i) => (
                            <div key={i} style={{ display: "grid", gridTemplateColumns: "160px 1fr 1fr", borderBottom: i < 7 ? `1px solid ${BORDER}` : "none", background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
                                <div style={{ padding: "9px 14px", fontSize: 12, fontWeight: 600, color: AMBER, fontFamily: "Arial, sans-serif", borderRight: `1px solid ${BORDER}` }}>{row.aspect}</div>
                                <div style={{ padding: "9px 14px", fontSize: 12, color: BLUE, fontFamily: "monospace", borderRight: `1px solid ${BORDER}` }}>{row.v4}</div>
                                <div style={{ padding: "9px 14px", fontSize: 12, color: GREEN, fontFamily: "monospace" }}>{row.v6}</div>
                            </div>
                        ))}
                    </div>
                </Section>
            </div>
        );
    }

    function TcpVsUdp() {
        return (
            <div>
                <Section title="TCP vs UDP — Full Comparison">
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
                        <div style={{ background: BLUE_LIGHT, border: `2px solid ${BLUE}`, borderRadius: 10, padding: 16 }}>
                            <div style={{ fontWeight: 700, fontSize: 15, color: BLUE, fontFamily: "Georgia, serif", marginBottom: 4 }}>TCP</div>
                            <div style={{ fontSize: 11, color: BLUE, fontFamily: "Arial, sans-serif", marginBottom: 12 }}>Transmission Control Protocol — Reliable</div>
                            {[
                                "Connection-oriented (requires handshake)",
                                "Guaranteed delivery — lost packets are retransmitted",
                                "Ordered delivery — packets arrive in sequence",
                                "Flow control — adjusts to receiver speed",
                                "Congestion control — backs off under network load",
                                "Error checking with checksums",
                                "Higher overhead → slower than UDP",
                                "Streams data (no message boundaries)",
                            ].map((p, i) => (
                                <div key={i} style={{ display: "flex", gap: 6, marginBottom: 5 }}>
                                    <span style={{ color: BLUE, fontWeight: 700, fontSize: 11 }}>✓</span>
                                    <span style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif" }}>{p}</span>
                                </div>
                            ))}
                        </div>
                        <div style={{ background: AMBER_LIGHT, border: `2px solid ${AMBER}`, borderRadius: 10, padding: 16 }}>
                            <div style={{ fontWeight: 700, fontSize: 15, color: AMBER, fontFamily: "Georgia, serif", marginBottom: 4 }}>UDP</div>
                            <div style={{ fontSize: 11, color: AMBER, fontFamily: "Arial, sans-serif", marginBottom: 12 }}>User Datagram Protocol — Fast</div>
                            {[
                                "Connectionless — no handshake",
                                "No guaranteed delivery — fire and forget",
                                "No ordering — packets may arrive out of order",
                                "No flow control",
                                "No congestion control",
                                "Error checking with checksums (but no correction)",
                                "Very low overhead → much faster",
                                "Preserves message boundaries (datagrams)",
                            ].map((p, i) => (
                                <div key={i} style={{ display: "flex", gap: 6, marginBottom: 5 }}>
                                    <span style={{ color: AMBER, fontWeight: 700, fontSize: 11 }}>→</span>
                                    <span style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif" }}>{p}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </Section>

                <Section title="When to Use Each" color={GREEN}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                        <div style={{ background: BLUE_LIGHT, border: `1.5px solid ${BLUE}`, borderRadius: 8, padding: 14 }}>
                            <div style={{ fontWeight: 700, fontSize: 12, color: BLUE, marginBottom: 10, fontFamily: "Arial, sans-serif" }}>Use TCP when:</div>
                            {[
                                { name: "HTTP/HTTPS", why: "Web browsing — every byte must arrive correctly" },
                                { name: "File Transfer (FTP)", why: "A single corrupted byte ruins the file" },
                                { name: "Email (SMTP/IMAP)", why: "Messages must be complete and ordered" },
                                { name: "SSH", why: "Remote shell commands must be reliable" },
                                { name: "Database queries", why: "Query results must be complete and accurate" },
                                { name: "API calls (REST, GraphQL)", why: "Request and response must not be lost" },
                            ].map((item, i) => (
                                <div key={i} style={{ marginBottom: 8 }}>
                                    <div style={{ fontWeight: 600, fontSize: 12, color: BLUE, fontFamily: "Arial, sans-serif" }}>{item.name}</div>
                                    <div style={{ fontSize: 11, color: GRAY, fontFamily: "Arial, sans-serif" }}>{item.why}</div>
                                </div>
                            ))}
                        </div>
                        <div style={{ background: AMBER_LIGHT, border: `1.5px solid ${AMBER}`, borderRadius: 8, padding: 14 }}>
                            <div style={{ fontWeight: 700, fontSize: 12, color: AMBER, marginBottom: 10, fontFamily: "Arial, sans-serif" }}>Use UDP when:</div>
                            {[
                                { name: "DNS lookups", why: "Small query/response, retries are cheap and fast" },
                                { name: "Live video/audio (VoIP)", why: "A dropped frame is better than freezing for retransmit" },
                                { name: "Online gaming", why: "Speed matters more than perfect accuracy" },
                                { name: "Video streaming", why: "Slight glitch is better than buffering" },
                                { name: "IoT sensors", why: "Periodic data where old readings can be dropped" },
                                { name: "HTTP/3 (QUIC)", why: "UDP-based, but adds reliability in application layer" },
                            ].map((item, i) => (
                                <div key={i} style={{ marginBottom: 8 }}>
                                    <div style={{ fontWeight: 600, fontSize: 12, color: AMBER, fontFamily: "Arial, sans-serif" }}>{item.name}</div>
                                    <div style={{ fontSize: 11, color: GRAY, fontFamily: "Arial, sans-serif" }}>{item.why}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </Section>

                <Section title="The Speed vs Reliability Trade-off" color={AMBER}>
                    <div style={{ background: "#f9f9f9", border: `1px solid ${BORDER}`, borderRadius: 10, padding: 16 }}>
                        <div style={{ fontFamily: "monospace", fontSize: 12, lineHeight: 1.9, color: "#333" }}>
                            TCP Round-trip:  SYN → SYN-ACK → ACK → DATA → ACK  (5 messages minimum)<br />
                            UDP Round-trip:  DATA → (maybe response)             (1–2 messages)<br />
                            <br />
                            TCP latency:  Adds ~1–3 round-trip times before data flows<br />
                            UDP latency:  Near zero — just the network transit time<br />
                            <br />
                            TCP throughput:  Adjusts dynamically (slow start, congestion window)<br />
                            UDP throughput:  Fixed — as fast as the network allows
                        </div>
                    </div>
                </Section>
            </div>
        );
    }

    function ThreeWayHandshake() {
        const [step, setStep] = useState(0);
        const steps = [
            {
                label: "SYN", icon: "👋", from: "Client → Server",
                color: BLUE, bg: BLUE_LIGHT,
                desc: "Client wants to establish a connection. Sends SYN (synchronize) packet.",
                detail: "Client picks a random Initial Sequence Number (ISN):\n\n  Flags: SYN = 1\n  Seq = 1000   (client's ISN, random)\n  Ack = 0      (no acknowledgement yet)\n\nMeaning: 'I want to connect. My sequence starts at 1000.'\n\nServer receives this and knows a client wants to talk."
            },
            {
                label: "SYN-ACK", icon: "🤝", from: "Server → Client",
                color: GREEN, bg: GREEN_LIGHT,
                desc: "Server accepts and sends its own SYN with an ACK confirming receipt.",
                detail: "Server picks its own random ISN:\n\n  Flags: SYN = 1, ACK = 1\n  Seq = 2000   (server's ISN, random)\n  Ack = 1001   (= client ISN + 1, confirming receipt)\n\nMeaning: 'I accept! My sequence starts at 2000. I received up to byte 1000.'\n\nClient now knows server is alive and willing to communicate."
            },
            {
                label: "ACK", icon: "✅", from: "Client → Server",
                color: AMBER, bg: AMBER_LIGHT,
                desc: "Client confirms the server's SYN. Connection is established.",
                detail: "Final acknowledgement from client:\n\n  Flags: ACK = 1\n  Seq = 1001   (client ISN + 1)\n  Ack = 2001   (= server ISN + 1, confirming receipt)\n\nMeaning: 'Got it! Connection established. I received your SYN.'\n\nBoth sides are now synchronized. Data transfer can begin.\nFor HTTPS, the TLS handshake begins immediately after this."
            },
            {
                label: "Connection Established", icon: "🔗", from: "Data flows",
                color: PURPLE, bg: PURPLE_LIGHT,
                desc: "The connection is open. Both sides can now send and receive data.",
                detail: "Data exchange:\n  Client → Server:  HTTP GET request\n  Server → Client:  HTTP 200 OK response\n\nEach data packet is acknowledged by the receiver.\nIf a packet is not ACKed within a timeout, it's retransmitted.\n\nSequence numbers track bytes so both sides can detect:\n  • Lost packets  → retransmit\n  • Out-of-order  → reorder\n  • Duplicates    → discard"
            },
            {
                label: "Connection Close (FIN/ACK)", icon: "👋", from: "4-Way Close",
                color: RED, bg: RED_LIGHT,
                desc: "Either side can close. Takes 4 steps (FIN, ACK, FIN, ACK).",
                detail: "4-way connection close:\n\n  Client → Server:  FIN (I'm done sending)\n  Server → Client:  ACK (Got it)\n  Server → Client:  FIN (I'm done too)\n  Client → Server:  ACK (OK, closing)\n\nClient waits in TIME_WAIT state (~2×MSL = ~60 seconds)\nbefore fully closing, to handle any delayed packets.\n\nAlternative: RST (reset) closes connection immediately\n  — used for errors or forceful termination."
            },
        ];

        return (
            <div>
                <Section title="TCP 3-Way Handshake — Full Detail">
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
                        {steps.map((s, i) => (
                            <button key={i} onClick={() => setStep(i)} style={{ padding: "6px 14px", borderRadius: 20, border: `1.5px solid ${step === i ? s.color : BORDER}`, background: step === i ? s.bg : "#fff", color: step === i ? s.color : GRAY, fontSize: 11, fontWeight: step === i ? 700 : 400, fontFamily: "Arial, sans-serif" }}>
                                {i + 1}. {s.label}
                            </button>
                        ))}
                    </div>

                    <div style={{ background: steps[step].bg, border: `2px solid ${steps[step].color}`, borderRadius: 10, padding: 18, marginBottom: 16 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                            <span style={{ fontSize: 36 }}>{steps[step].icon}</span>
                            <div>
                                <div style={{ fontSize: 11, fontWeight: 700, color: steps[step].color, fontFamily: "Arial, sans-serif", letterSpacing: 0.5 }}>{steps[step].from}</div>
                                <div style={{ fontWeight: 700, fontSize: 15, color: steps[step].color, fontFamily: "Georgia, serif" }}>Step {step + 1}: {steps[step].label}</div>
                            </div>
                        </div>
                        <p style={{ margin: "0 0 12px", fontSize: 13, color: GRAY, fontFamily: "Arial, sans-serif" }}>{steps[step].desc}</p>
                        <div style={{ background: "rgba(255,255,255,0.7)", borderRadius: 6, padding: 14, fontSize: 12, fontFamily: "monospace", color: "#333", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{steps[step].detail}</div>
                    </div>

                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <button onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${BORDER}`, background: "#fff", opacity: step === 0 ? 0.4 : 1, fontFamily: "Arial, sans-serif", fontSize: 12 }}>← Previous</button>
                        <span style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", alignSelf: "center" }}>{step + 1} / {steps.length}</span>
                        <button onClick={() => setStep(Math.min(steps.length - 1, step + 1))} disabled={step === steps.length - 1} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${GREEN}`, background: GREEN_LIGHT, color: GREEN, opacity: step === steps.length - 1 ? 0.4 : 1, fontFamily: "Arial, sans-serif", fontSize: 12, fontWeight: 700 }}>Next →</button>
                    </div>
                </Section>

                <Section title="Visual Sequence Diagram" color={AMBER}>
                    <div style={{ background: "#f9f9f9", border: `1px solid ${BORDER}`, borderRadius: 10, padding: 16, fontFamily: "monospace", fontSize: 12, lineHeight: 2.2 }}>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", textAlign: "center", marginBottom: 8 }}>
                            <div style={{ fontWeight: 700, color: BLUE }}>CLIENT</div>
                            <div style={{ color: GRAY }}></div>
                            <div style={{ fontWeight: 700, color: GREEN }}>SERVER</div>
                        </div>
                        {[
                            { left: "●", arrow: "──── SYN (seq=1000) ────────────►", right: "" },
                            { left: "", arrow: "◄── SYN-ACK (seq=2000, ack=1001) ─", right: "●" },
                            { left: "●", arrow: "──── ACK (ack=2001) ────────────►", right: "" },
                            { left: "◌", arrow: "════ CONNECTION ESTABLISHED ═════", right: "◌" },
                            { left: "●", arrow: "──── HTTP GET /api/users ────────►", right: "" },
                            { left: "", arrow: "◄── HTTP 200 OK {data} ───────────", right: "●" },
                            { left: "◌", arrow: "────────────── ─ ─ ─ ─ ─ ─ ─ ──", right: "◌" },
                            { left: "●", arrow: "──── FIN ────────────────────────►", right: "" },
                            { left: "", arrow: "◄── ACK ──────────────────────────", right: "●" },
                            { left: "", arrow: "◄── FIN ──────────────────────────", right: "●" },
                            { left: "●", arrow: "──── ACK ────────────────────────►", right: "" },
                        ].map((row, i) => (
                            <div key={i} style={{ display: "grid", gridTemplateColumns: "60px 1fr 60px", alignItems: "center", color: i >= 7 ? RED : i === 3 ? PURPLE : i === 6 ? "#999" : "#333", fontSize: i === 3 ? 12 : 11 }}>
                                <div style={{ textAlign: "center", color: BLUE }}>{row.left}</div>
                                <div style={{ textAlign: "center" }}>{row.arrow}</div>
                                <div style={{ textAlign: "center", color: GREEN }}>{row.right}</div>
                            </div>
                        ))}
                    </div>
                </Section>
            </div>
        );
    }

    function DnsLookup() {
        const [step, setStep] = useState(0);
        const steps = [
            { label: "Browser Cache", icon: "🌐", color: BLUE, bg: BLUE_LIGHT, desc: "First stop — browser checks its own DNS cache.", detail: "Browser stores recently resolved domain-to-IP mappings.\n\nExample: 'I looked up google.com 30 seconds ago → 142.250.80.46'\n\nTTL (Time To Live) determines how long to cache.\nIf TTL has not expired → use cached IP, skip all other steps.\nTypical browser DNS TTL: 60 seconds to 5 minutes." },
            { label: "OS / Hosts File", icon: "🖥️", color: BLUE, bg: BLUE_LIGHT, desc: "OS checks its cache and the hosts file.", detail: "The OS has its own DNS cache (separate from browser).\n\nAlso checks /etc/hosts (Linux/Mac) or C:\\Windows\\System32\\drivers\\etc\\hosts\n\nHosts file format:\n  127.0.0.1    localhost\n  192.168.1.10 my-dev-server.local\n\nHosts file entries always take priority over DNS.\nDevelopers use this to test domains locally." },
            { label: "Recursive Resolver", icon: "📡", color: AMBER, bg: AMBER_LIGHT, desc: "Your ISP or a configured DNS resolver (8.8.8.8, 1.1.1.1).", detail: "The Recursive Resolver does the actual work of finding the IP.\n\nCommon public resolvers:\n  8.8.8.8      = Google Public DNS\n  1.1.1.1      = Cloudflare DNS (fastest)\n  9.9.9.9      = Quad9 DNS\n  <ISP server> = Your Internet Service Provider\n\nThe resolver checks its own cache first.\nIf not cached, it starts querying the DNS hierarchy." },
            { label: "Root Nameservers", icon: "🌍", color: PURPLE, bg: PURPLE_LIGHT, desc: "Top of the DNS hierarchy — 13 root server clusters worldwide.", detail: "There are 13 root nameserver addresses (a.root-servers.net through m.root-servers.net).\nEach is actually a cluster of hundreds of servers using anycast.\n\nResolver asks Root: 'Who handles .com?'\nRoot responds: 'Ask the .com TLD server at 192.5.6.30'\n\nRoot servers don't know IPs — they only know which TLD server to ask.\nRoot servers are rarely queried directly (heavy caching reduces load)." },
            { label: "TLD Nameserver", icon: "🏷️", color: GREEN, bg: GREEN_LIGHT, desc: "The nameserver responsible for a top-level domain (.com, .org, .io).", detail: "TLD = Top-Level Domain\n\nExamples:\n  .com → Verisign TLD servers\n  .org → Public Interest Registry\n  .io  → IANA-delegated servers\n  .uk  → Nominet TLD servers\n\nResolver asks TLD server: 'Who handles example.com?'\nTLD server responds: 'Ask ns1.exampleregistrar.com at 205.251.196.1'\n\nTLD servers know which nameserver is authoritative for each domain." },
            { label: "Authoritative Nameserver", icon: "🔑", color: GREEN, bg: GREEN_LIGHT, desc: "The definitive source of truth for the domain's DNS records.", detail: "This is the nameserver you configure at your domain registrar.\n\nResolver asks: 'What is the IP of www.example.com?'\nAuthoritative NS responds: 'A record: 93.184.216.34, TTL: 3600'\n\nCommon DNS record types:\n  A     → IPv4 address\n  AAAA  → IPv6 address\n  CNAME → Alias to another domain\n  MX    → Mail server\n  TXT   → Text (SPF, DKIM, site verification)\n  NS    → Nameserver\n  SOA   → Start of Authority (zone info)" },
            { label: "IP Returned", icon: "✅", color: BLUE, bg: BLUE_LIGHT, desc: "Browser receives the IP and caches it for future use.", detail: "Full round trip complete!\n\nThe resolver returns 93.184.216.34 to the browser.\n\nBrowser caches it with the TTL from the DNS record.\nOS also caches it.\nResolver caches it (serves future queries without full lookup).\n\nBrowser can now open a TCP connection to 93.184.216.34:443\nand start the TLS handshake.\n\nTotal time for a cold DNS lookup: 20–150 ms\nCached lookup: < 1 ms" },
        ];

        return (
            <div>
                <Section title="DNS Lookup Flow — Step by Step">
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
                        {steps.map((s, i) => (
                            <button key={i} onClick={() => setStep(i)} style={{ padding: "6px 12px", borderRadius: 20, border: `1.5px solid ${step === i ? s.color : BORDER}`, background: step === i ? s.bg : "#fff", color: step === i ? s.color : GRAY, fontSize: 11, fontWeight: step === i ? 700 : 400, fontFamily: "Arial, sans-serif" }}>
                                {i + 1}. {s.label}
                            </button>
                        ))}
                    </div>

                    <div style={{ background: steps[step].bg, border: `2px solid ${steps[step].color}`, borderRadius: 10, padding: 18, marginBottom: 16 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                            <span style={{ fontSize: 36 }}>{steps[step].icon}</span>
                            <div>
                                <div style={{ fontWeight: 700, fontSize: 15, color: steps[step].color, fontFamily: "Georgia, serif" }}>Step {step + 1}: {steps[step].label}</div>
                            </div>
                        </div>
                        <p style={{ margin: "0 0 12px", fontSize: 13, color: GRAY, fontFamily: "Arial, sans-serif" }}>{steps[step].desc}</p>
                        <div style={{ background: "rgba(255,255,255,0.7)", borderRadius: 6, padding: 14, fontSize: 12, fontFamily: "monospace", color: "#333", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{steps[step].detail}</div>
                    </div>

                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <button onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${BORDER}`, background: "#fff", opacity: step === 0 ? 0.4 : 1, fontFamily: "Arial, sans-serif", fontSize: 12 }}>← Previous</button>
                        <span style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", alignSelf: "center" }}>{step + 1} / {steps.length}</span>
                        <button onClick={() => setStep(Math.min(steps.length - 1, step + 1))} disabled={step === steps.length - 1} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${GREEN}`, background: GREEN_LIGHT, color: GREEN, opacity: step === steps.length - 1 ? 0.4 : 1, fontFamily: "Arial, sans-serif", fontSize: 12, fontWeight: 700 }}>Next →</button>
                    </div>
                </Section>
            </div>
        );
    }

    function Packets() {
        return (
            <div>
                <Section title="What Is a Packet?">
                    <div style={{ fontSize: 12, color: GRAY, marginBottom: 14, fontFamily: "Arial, sans-serif", lineHeight: 1.6 }}>
                        When data is sent over a network, it's broken into small chunks called <strong>packets</strong>. Each packet travels independently through the network and may take different routes to reach the destination.
                    </div>

                    <div style={{ background: "#f9f9f9", border: `1px solid ${BORDER}`, borderRadius: 10, padding: 16, marginBottom: 20 }}>
                        <div style={{ fontWeight: 700, fontSize: 13, color: GREEN, marginBottom: 12, fontFamily: "Arial, sans-serif" }}>Anatomy of an IP Packet</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                            {[
                                { label: "IP Header (20 bytes min)", fields: "Version | IHL | DSCP | Total Length | ID | Flags | Fragment Offset | TTL | Protocol | Checksum | Source IP | Dest IP", color: AMBER, bg: AMBER_LIGHT },
                                { label: "TCP Header (20 bytes min)", fields: "Source Port | Dest Port | Seq Number | Ack Number | Data Offset | Flags | Window | Checksum | Urgent Pointer", color: BLUE, bg: BLUE_LIGHT },
                                { label: "Application Data (Payload)", fields: "HTTP request / response, or any other application data", color: GREEN, bg: GREEN_LIGHT },
                            ].map((row, i) => (
                                <div key={i} style={{ background: row.bg, border: `1px solid ${row.color}`, borderRadius: 6, padding: "10px 14px" }}>
                                    <div style={{ fontWeight: 700, fontSize: 11, color: row.color, fontFamily: "Arial, sans-serif", marginBottom: 4 }}>{row.label}</div>
                                    <div style={{ fontSize: 11, fontFamily: "monospace", color: "#555" }}>{row.fields}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </Section>

                <Section title="Key Header Fields Explained" color={BLUE}>
                    <div style={{ border: `1px solid ${BORDER}`, borderRadius: 10, overflow: "hidden" }}>
                        {[
                            { field: "TTL (Time To Live)", desc: "Decremented by each router. When it hits 0, packet is dropped (ICMP TTL exceeded). Prevents infinite routing loops.", color: RED },
                            { field: "Protocol", desc: "Tells IP what's inside: 6 = TCP, 17 = UDP, 1 = ICMP. Lets the receiving OS hand packet to the right handler.", color: BLUE },
                            { field: "Source IP / Dest IP", desc: "Where the packet came from and where it's going. Routers use Dest IP to forward.", color: AMBER },
                            { field: "Flags + Fragment Offset", desc: "IP fragmentation: if a packet is too large for a link, it's split into fragments and reassembled at destination.", color: GREEN },
                            { field: "Seq / Ack Number (TCP)", desc: "Track bytes sent/received. Enables ordered delivery, loss detection, and retransmission.", color: BLUE },
                            { field: "Window Size (TCP)", desc: "How many bytes the receiver can accept without sending an ACK. Flow control mechanism.", color: PURPLE },
                            { field: "Checksum", desc: "Error detection — if checksum doesn't match, the packet is silently discarded.", color: GREEN },
                        ].map((row, i) => (
                            <div key={i} style={{ display: "flex", borderBottom: i < 6 ? `1px solid ${BORDER}` : "none", background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
                                <div style={{ width: 10, background: row.color, flexShrink: 0 }} />
                                <div style={{ padding: "10px 14px", flex: 1 }}>
                                    <div style={{ fontWeight: 700, fontSize: 12, color: row.color, fontFamily: "monospace", marginBottom: 2 }}>{row.field}</div>
                                    <div style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif" }}>{row.desc}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                </Section>

                <Section title="How Routing Works" color={AMBER}>
                    <div style={{ background: AMBER_LIGHT, border: `1.5px solid ${AMBER}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
                        <div style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", lineHeight: 1.7 }}>
                            Every router has a <strong>routing table</strong> — a list of network prefixes and which interface/next-hop to use. When a packet arrives, the router reads the destination IP, finds the longest matching prefix in its table, and forwards the packet.<br /><br />
                            Packets from the same TCP connection can take different routes and arrive out of order. TCP's sequence numbers handle reordering on the receiving end.
                        </div>
                    </div>
                    <div style={{ background: "#f9f9f9", border: `1px solid ${BORDER}`, borderRadius: 8, padding: 14, fontFamily: "monospace", fontSize: 11, lineHeight: 2 }}>
                        Your PC (192.168.1.50)<br />
                        &nbsp;&nbsp;&nbsp;↓  (local network)<br />
                        Home Router (192.168.1.1 / 203.0.113.5)<br />
                        &nbsp;&nbsp;&nbsp;↓  (ISP backbone)<br />
                        ISP Router A → ISP Router B → ...<br />
                        &nbsp;&nbsp;&nbsp;↓  (internet backbone)<br />
                        Destination Server (93.184.216.34)<br />
                        <br />
                        <span style={{ color: GRAY }}>TTL starts at 64 or 128. Decremented at each hop. 'traceroute' shows every hop.</span>
                    </div>
                </Section>
            </div>
        );
    }

    const views = [FourLayers, IpAddressing, TcpVsUdp, ThreeWayHandshake, DnsLookup, Packets];

    function App() {
        const [tab, setTab] = useState(0);
        const View = views[tab];
        return (
            <div style={{ maxWidth: 820, margin: "0 auto", padding: "30px 16px" }}>
                <div style={{ borderLeft: `4px solid ${GREEN}`, paddingLeft: 14, marginBottom: 24 }}>
                    <p style={{ margin: 0, fontSize: 11, color: GREEN, fontWeight: 700, letterSpacing: 1, fontFamily: "Arial, sans-serif" }}>QA INTERNSHIP — WEB FUNDAMENTALS</p>
                    <h1 style={{ margin: "4px 0 0", fontSize: 26, fontWeight: 700, color: "#1a1a1a", fontFamily: "Georgia, serif" }}>TCP/IP</h1>
                </div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 24, borderBottom: `2px solid ${BORDER}`, paddingBottom: 12 }}>
                    {tabs.map((t, i) => (
                        <button key={t} onClick={() => setTab(i)} style={{ padding: "7px 14px", borderRadius: 6, border: `1.5px solid ${tab === i ? GREEN : BORDER}`, background: tab === i ? GREEN : "#fff", color: tab === i ? "#fff" : GRAY, fontSize: 12, fontWeight: tab === i ? 700 : 400, fontFamily: "Arial, sans-serif" }}>{t}</button>
                    ))}
                </div>
                <View />
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
