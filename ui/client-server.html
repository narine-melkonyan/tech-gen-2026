<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Client-Server Model — QA Internship</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f5f5f5; font-family: Arial, sans-serif; }
        button { cursor: pointer; transition: opacity 0.15s; }
        button:hover { opacity: 0.85; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState } = React;

    const GREEN = "#1a5c35";
    const GREEN_LIGHT = "#e8f5ee";
    const BLUE = "#185FA5";
    const BLUE_LIGHT = "#e6f1fb";
    const AMBER = "#854f0b";
    const AMBER_LIGHT = "#faeeda";
    const RED = "#a32d2d";
    const RED_LIGHT = "#fcebeb";
    const GRAY = "#444";
    const BORDER = "#ddd";

    const tabs = ["Basic Model", "URL Journey", "Request Flow", "Ports", "Stateless HTTP", "CS vs P2P", "Multi-tier", "Real World", "QA View"];

    function Section({ title, color = GREEN, children }) {
        return (
            <div style={{ marginBottom: 28 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                    <div style={{ width: 4, height: 20, background: color, borderRadius: 2 }} />
                    <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color, fontFamily: "Georgia, serif" }}>{title}</h3>
                </div>
                {children}
            </div>
        );
    }

    function Box({ label, sub, icon, color = GREEN, bg = GREEN_LIGHT, width = "auto", center = false }) {
        return (
            <div style={{ background: bg, border: `2px solid ${color}`, borderRadius: 10, padding: "12px 16px", width, textAlign: center ? "center" : "left", flexShrink: 0 }}>
                {icon && <div style={{ fontSize: 22, marginBottom: 4 }}>{icon}</div>}
                <div style={{ fontWeight: 700, fontSize: 13, color, fontFamily: "Arial, sans-serif" }}>{label}</div>
                {sub && <div style={{ fontSize: 11, color: GRAY, marginTop: 3, fontFamily: "Arial, sans-serif", lineHeight: 1.4 }}>{sub}</div>}
            </div>
        );
    }

    function BasicModel() {
        return (
            <div>
                <Section title="The Core Concept">
                    <div style={{ background: "#f9f9f9", border: `1px solid ${BORDER}`, borderRadius: 10, padding: 20, marginBottom: 20 }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
                            <Box label="CLIENT" sub={"Browser / App\nPostman / Script"} icon="💻" color={BLUE} bg={BLUE_LIGHT} width={130} center />
                            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                    <div style={{ fontSize: 10, color: GREEN, fontFamily: "Arial, sans-serif", fontWeight: 700 }}>REQUEST →</div>
                                    <div style={{ height: 2, background: GREEN, width: 80 }} />
                                </div>
                                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                    <div style={{ height: 2, background: RED, width: 80 }} />
                                    <div style={{ fontSize: 10, color: RED, fontFamily: "Arial, sans-serif", fontWeight: 700 }}>← RESPONSE</div>
                                </div>
                            </div>
                            <Box label="SERVER" sub={"Processes requests\nReturns data"} icon="🖥️" color={GREEN} bg={GREEN_LIGHT} width={130} center />
                        </div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                        {[
                            { title: "CLIENT always:", points: ["Initiates the request", "Never receives unsolicited data", "Examples: browser, mobile app, Postman, curl, test script"], color: BLUE, bg: BLUE_LIGHT },
                            { title: "SERVER always:", points: ["Waits and listens", "Responds only when asked", "Examples: web server, API server, database server"], color: GREEN, bg: GREEN_LIGHT },
                        ].map(({ title, points, color, bg }) => (
                            <div key={title} style={{ background: bg, border: `1.5px solid ${color}`, borderRadius: 8, padding: 14 }}>
                                <div style={{ fontWeight: 700, fontSize: 12, color, marginBottom: 8, fontFamily: "Arial, sans-serif" }}>{title}</div>
                                {points.map((p, i) => (
                                    <div key={i} style={{ display: "flex", gap: 6, marginBottom: 4 }}>
                                        <span style={{ color, fontWeight: 700, fontSize: 11 }}>•</span>
                                        <span style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif" }}>{p}</span>
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                </Section>

                <Section title="The Restaurant Analogy" color={AMBER}>
                    <div style={{ background: AMBER_LIGHT, border: `1.5px solid ${AMBER}`, borderRadius: 10, padding: 16 }}>
                        <div style={{ display: "flex", justifyContent: "space-around", flexWrap: "wrap", gap: 12, marginBottom: 14 }}>
                            {[
                                { icon: "🧑", label: "Customer", sub: "= Client (Browser)", color: BLUE },
                                { icon: "🤵", label: "Waiter", sub: "= Server (API)", color: GREEN },
                                { icon: "👨‍🍳", label: "Kitchen", sub: "= Database", color: AMBER },
                            ].map(({ icon, label, sub, color }) => (
                                <div key={label} style={{ textAlign: "center" }}>
                                    <div style={{ fontSize: 32 }}>{icon}</div>
                                    <div style={{ fontWeight: 700, fontSize: 13, color, fontFamily: "Arial, sans-serif" }}>{label}</div>
                                    <div style={{ fontSize: 11, color: GRAY, fontFamily: "Arial, sans-serif" }}>{sub}</div>
                                </div>
                            ))}
                        </div>
                        <div style={{ borderTop: `1px solid ${AMBER}`, paddingTop: 12 }}>
                            {[
                                "Customer (client) reads the menu and places an order (HTTP request)",
                                "Waiter (server) takes the order to the kitchen (processes request, queries DB)",
                                "Kitchen (database) prepares the food (returns data)",
                                "Waiter (server) brings the food back (HTTP response)",
                                "Customer (client) receives and consumes it (renders in browser)",
                            ].map((step, i) => (
                                <div key={i} style={{ display: "flex", gap: 10, marginBottom: 6, alignItems: "flex-start" }}>
                                    <div style={{ width: 20, height: 20, borderRadius: "50%", background: AMBER, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, flexShrink: 0, fontFamily: "Arial, sans-serif" }}>{i + 1}</div>
                                    <span style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", lineHeight: 1.5 }}>{step}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </Section>
            </div>
        );
    }

    function UrlJourney() {
        const [step, setStep] = useState(0);
        const steps = [
            {
                label: "Type URL & Press Enter", icon: "⌨️", phase: "Client",
                color: BLUE, bg: BLUE_LIGHT,
                desc: "You type https://www.example.com/products?id=42 and press Enter.",
                detail: "The browser parses the URL into parts:\n  • Scheme:  https\n  • Host:    www.example.com\n  • Path:    /products\n  • Query:   ?id=42\n\nThe browser checks if it already has a cached IP for this domain."
            },
            {
                label: "DNS Resolution", icon: "🔍", phase: "Network",
                color: AMBER, bg: AMBER_LIGHT,
                desc: "Browser needs the IP address of www.example.com.",
                detail: "DNS lookup order:\n  1. Browser cache (checked first)\n  2. OS cache / hosts file\n  3. Router cache\n  4. Recursive resolver (your ISP)\n  5. Root nameserver → .com TLD server\n  6. Authoritative nameserver for example.com\n\nResult: 93.184.216.34\nThis entire lookup often takes < 10ms."
            },
            {
                label: "TCP Connection", icon: "🤝", phase: "Network",
                color: AMBER, bg: AMBER_LIGHT,
                desc: "Browser opens a TCP connection to port 443 on 93.184.216.34.",
                detail: "3-Way Handshake:\n  Client → SYN         (seq=1000)\n  Server → SYN-ACK     (seq=2000, ack=1001)\n  Client → ACK         (ack=2001)\n\nTCP connection established.\nPort 443 = HTTPS. Port 80 = HTTP."
            },
            {
                label: "TLS Handshake", icon: "🔐", phase: "Security",
                color: "#5b21b6", bg: "#ede9fe",
                desc: "Browser and server negotiate encryption (TLS 1.3).",
                detail: "TLS 1.3 Handshake:\n  1. Client Hello — TLS version, cipher suites, random\n  2. Server Hello — chosen cipher, certificate, public key\n  3. Client validates certificate (signed by trusted CA?)\n  4. Both derive session keys using ECDHE key exchange\n  5. Finished messages exchanged\n\nAll further data is now encrypted. Takes ~1 round trip in TLS 1.3."
            },
            {
                label: "HTTP Request Sent", icon: "📤", phase: "Client",
                color: BLUE, bg: BLUE_LIGHT,
                desc: "Browser sends the encrypted HTTP GET request to the server.",
                detail: "GET /products?id=42 HTTP/2\nHost: www.example.com\nAccept: text/html,application/xhtml+xml\nAccept-Language: en-US,en;q=0.9\nAccept-Encoding: gzip, deflate, br\nUser-Agent: Mozilla/5.0 ...\nCookie: session=abc123\n\n(no body — GET has no body)"
            },
            {
                label: "Server Processing", icon: "⚙️", phase: "Server",
                color: GREEN, bg: GREEN_LIGHT,
                desc: "Server decrypts, parses, and processes the request.",
                detail: "Server steps:\n  1. Decrypt the request\n  2. Parse method, path, headers, body\n  3. Authenticate (validate session cookie)\n  4. Route to the correct handler\n  5. Query database: SELECT * FROM products WHERE id = 42\n  6. Build HTML/JSON response\n  7. Set response headers (Content-Type, Cache-Control, etc.)\n  8. Encrypt and send response"
            },
            {
                label: "HTTP Response", icon: "📥", phase: "Server",
                color: GREEN, bg: GREEN_LIGHT,
                desc: "Server sends back status code, headers, and the response body.",
                detail: "HTTP/2 200 OK\nContent-Type: text/html; charset=utf-8\nContent-Encoding: gzip\nCache-Control: max-age=3600\nETag: \"abc123\"\nSet-Cookie: viewed=42; Path=/; HttpOnly\n\n<html>...(compressed HTML body)...</html>"
            },
            {
                label: "Browser Parses HTML", icon: "🧩", phase: "Client",
                color: BLUE, bg: BLUE_LIGHT,
                desc: "Browser receives the response and starts building the page.",
                detail: "Browser parsing steps:\n  1. Parse HTML → build DOM tree\n  2. Parse CSS → build CSSOM tree\n  3. Combine → Render tree\n  4. Sub-resources discovered: <img>, <script>, <link>\n  5. Browser fires additional HTTP requests for each\n     (images, CSS files, JS files — often in parallel)\n  6. JS is parsed and executed"
            },
            {
                label: "Page Renders", icon: "🖼️", phase: "Client",
                color: BLUE, bg: BLUE_LIGHT,
                desc: "User sees the finished page. The full round-trip is complete.",
                detail: "Rendering pipeline:\n  1. Layout (Reflow) — calculate positions and sizes\n  2. Paint — draw pixels for each element\n  3. Composite — layers merged on GPU\n\nThe connection stays open (HTTP/2 multiplexing).\nFuture requests reuse the same TCP+TLS connection.\nTotal time (typical): 200ms – 2s"
            },
        ];

        const phaseColor = { Client: BLUE, Network: AMBER, Security: "#5b21b6", Server: GREEN };
        const phaseBg = { Client: BLUE_LIGHT, Network: AMBER_LIGHT, Security: "#ede9fe", Server: GREEN_LIGHT };

        return (
            <div>
                <Section title="Full URL Journey: What Happens When You Press Enter">
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
                        {steps.map((s, i) => (
                            <button key={i} onClick={() => setStep(i)} style={{ padding: "6px 12px", borderRadius: 20, border: `1.5px solid ${step === i ? s.color : BORDER}`, background: step === i ? s.bg : "#fff", color: step === i ? s.color : GRAY, fontSize: 11, fontWeight: step === i ? 700 : 400, fontFamily: "Arial, sans-serif" }}>
                                {i + 1}. {s.label}
                            </button>
                        ))}
                    </div>

                    <div style={{ background: steps[step].bg, border: `2px solid ${steps[step].color}`, borderRadius: 10, padding: 18, marginBottom: 16 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                            <span style={{ fontSize: 36 }}>{steps[step].icon}</span>
                            <div>
                                <div style={{ fontSize: 10, fontWeight: 700, color: steps[step].color, fontFamily: "Arial, sans-serif", letterSpacing: 1 }}>{steps[step].phase.toUpperCase()} PHASE</div>
                                <div style={{ fontWeight: 700, fontSize: 15, color: steps[step].color, fontFamily: "Georgia, serif" }}>Step {step + 1}: {steps[step].label}</div>
                            </div>
                        </div>
                        <p style={{ margin: "0 0 12px", fontSize: 13, color: GRAY, fontFamily: "Arial, sans-serif" }}>{steps[step].desc}</p>
                        <div style={{ background: "rgba(255,255,255,0.7)", borderRadius: 6, padding: 14, fontSize: 12, color: "#333", fontFamily: "monospace", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{steps[step].detail}</div>
                    </div>

                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <button onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${BORDER}`, background: "#fff", opacity: step === 0 ? 0.4 : 1, fontFamily: "Arial, sans-serif", fontSize: 12 }}>← Previous</button>
                        <span style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", alignSelf: "center" }}>{step + 1} / {steps.length}</span>
                        <button onClick={() => setStep(Math.min(steps.length - 1, step + 1))} disabled={step === steps.length - 1} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${GREEN}`, background: GREEN_LIGHT, color: GREEN, opacity: step === steps.length - 1 ? 0.4 : 1, fontFamily: "Arial, sans-serif", fontSize: 12, fontWeight: 700 }}>Next →</button>
                    </div>
                </Section>

                <Section title="Visual Timeline" color={AMBER}>
                    <div style={{ border: `1px solid ${BORDER}`, borderRadius: 10, overflow: "hidden" }}>
                        {[
                            { phase: "DNS", time: "~5–50 ms", color: AMBER, bg: AMBER_LIGHT },
                            { phase: "TCP Handshake", time: "~20–100 ms (1 RTT)", color: AMBER, bg: AMBER_LIGHT },
                            { phase: "TLS Handshake", time: "~20–100 ms (1 RTT in TLS 1.3)", color: "#5b21b6", bg: "#ede9fe" },
                            { phase: "HTTP Request + Server Processing", time: "~50–500 ms", color: GREEN, bg: GREEN_LIGHT },
                            { phase: "HTML Download", time: "~10–200 ms", color: BLUE, bg: BLUE_LIGHT },
                            { phase: "Sub-resources (CSS, JS, images)", time: "~100–1000 ms (parallel)", color: BLUE, bg: BLUE_LIGHT },
                            { phase: "Render & Paint", time: "~10–100 ms", color: BLUE, bg: BLUE_LIGHT },
                        ].map((row, i) => (
                            <div key={i} style={{ display: "flex", borderBottom: i < 6 ? `1px solid ${BORDER}` : "none", background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
                                <div style={{ width: 12, background: row.bg, borderRight: `2px solid ${row.color}`, flexShrink: 0 }} />
                                <div style={{ padding: "10px 14px", flex: 1, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <span style={{ fontSize: 13, fontWeight: 600, color: row.color, fontFamily: "Arial, sans-serif" }}>{row.phase}</span>
                                    <span style={{ fontSize: 12, color: GRAY, fontFamily: "monospace" }}>{row.time}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </Section>
            </div>
        );
    }

    function RequestFlow() {
        const [step, setStep] = useState(0);
        const steps = [
            { label: "User Action", icon: "👆", desc: "User types URL or clicks a button in the browser", side: "client", detail: "The client prepares an HTTP request. It needs: Method (GET/POST), URL, Headers (Authorization, Content-Type), and optionally a Body." },
            { label: "DNS Lookup", icon: "🔍", desc: "Browser resolves domain name to IP address", side: "network", detail: "The browser asks a DNS server: 'What is the IP address of api.example.com?' DNS returns: 192.168.1.100. Now the browser knows where to send the request." },
            { label: "TCP Handshake", icon: "🤝", desc: "Client and server establish a connection", side: "network", detail: "3-way handshake:\n(1) Client → SYN → Server\n(2) Server → SYN-ACK → Client\n(3) Client → ACK → Server\nConnection is now open. For HTTPS, TLS negotiation happens here too." },
            { label: "HTTP Request Sent", icon: "📤", desc: "Client sends the HTTP request over the connection", side: "client", detail: "GET /api/users HTTP/1.1\nHost: api.example.com\nAuthorization: Bearer <token>\nAccept: application/json" },
            { label: "Server Processing", icon: "⚙️", desc: "Server receives request, processes it, queries database", side: "server", detail: "Server:\n(1) Validates the request (auth, params)\n(2) Executes business logic\n(3) Queries the database\n(4) Formats the response\n(5) Sets response headers" },
            { label: "HTTP Response Sent", icon: "📥", desc: "Server sends back status code, headers, and body", side: "server", detail: 'HTTP/1.1 200 OK\nContent-Type: application/json\nCache-Control: no-store\n\n{"id": 1, "name": "John"}' },
            { label: "Browser Renders", icon: "🖼️", desc: "Client receives response and displays the result", side: "client", detail: "Browser parses JSON/HTML, updates the DOM, renders the UI. The user sees the result. The TCP connection may stay open (keep-alive) for future requests." },
        ];
        const sideColor = { client: BLUE, network: AMBER, server: GREEN };
        const sideBg = { client: BLUE_LIGHT, network: AMBER_LIGHT, server: GREEN_LIGHT };
        const sideLabel = { client: "CLIENT SIDE", network: "NETWORK", server: "SERVER SIDE" };

        return (
            <Section title="Step-by-Step Request-Response Cycle">
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
                    {steps.map((s, i) => (
                        <button key={i} onClick={() => setStep(i)} style={{ padding: "6px 12px", borderRadius: 20, border: `1.5px solid ${step === i ? sideColor[s.side] : BORDER}`, background: step === i ? sideBg[s.side] : "#fff", color: step === i ? sideColor[s.side] : GRAY, fontSize: 11, fontWeight: step === i ? 700 : 400, fontFamily: "Arial, sans-serif" }}>
                            {i + 1}. {s.label}
                        </button>
                    ))}
                </div>
                <div style={{ background: sideBg[steps[step].side], border: `2px solid ${sideColor[steps[step].side]}`, borderRadius: 10, padding: 18, marginBottom: 16 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                        <span style={{ fontSize: 32 }}>{steps[step].icon}</span>
                        <div>
                            <div style={{ fontSize: 10, fontWeight: 700, color: sideColor[steps[step].side], fontFamily: "Arial, sans-serif", letterSpacing: 1 }}>{sideLabel[steps[step].side]}</div>
                            <div style={{ fontWeight: 700, fontSize: 15, color: sideColor[steps[step].side], fontFamily: "Georgia, serif" }}>Step {step + 1}: {steps[step].label}</div>
                        </div>
                    </div>
                    <p style={{ margin: "0 0 10px", fontSize: 13, color: GRAY, fontFamily: "Arial, sans-serif" }}>{steps[step].desc}</p>
                    <div style={{ background: "rgba(255,255,255,0.6)", borderRadius: 6, padding: 12, fontSize: 12, color: "#333", fontFamily: "monospace", lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{steps[step].detail}</div>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                    <button onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${BORDER}`, background: "#fff", opacity: step === 0 ? 0.4 : 1, fontFamily: "Arial, sans-serif", fontSize: 12 }}>← Previous</button>
                    <span style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", alignSelf: "center" }}>{step + 1} / {steps.length}</span>
                    <button onClick={() => setStep(Math.min(steps.length - 1, step + 1))} disabled={step === steps.length - 1} style={{ padding: "8px 16px", borderRadius: 6, border: `1px solid ${GREEN}`, background: GREEN_LIGHT, color: GREEN, opacity: step === steps.length - 1 ? 0.4 : 1, fontFamily: "Arial, sans-serif", fontSize: 12, fontWeight: 700 }}>Next →</button>
                </div>
            </Section>
        );
    }

    function Ports() {
        const ranges = [
            { range: "0 – 1023", name: "Well-Known Ports", desc: "Reserved for standard protocols. Requires root/admin to bind.", color: RED, bg: RED_LIGHT },
            { range: "1024 – 49151", name: "Registered Ports", desc: "Assigned to specific apps by IANA. Common for databases and dev tools.", color: AMBER, bg: AMBER_LIGHT },
            { range: "49152 – 65535", name: "Dynamic / Ephemeral Ports", desc: "Assigned automatically by OS for outgoing connections.", color: GREEN, bg: GREEN_LIGHT },
        ];

        const ports = [
            { port: 21, proto: "FTP", use: "File Transfer (control)", color: AMBER },
            { port: 22, proto: "SSH", use: "Secure Shell (encrypted terminal)", color: GREEN },
            { port: 25, proto: "SMTP", use: "Email sending", color: AMBER },
            { port: 53, proto: "DNS", use: "Domain Name resolution (UDP+TCP)", color: AMBER },
            { port: 80, proto: "HTTP", use: "Web traffic (unencrypted)", color: BLUE },
            { port: 110, proto: "POP3", use: "Email retrieval (download & delete)", color: AMBER },
            { port: 143, proto: "IMAP", use: "Email retrieval (sync, keep on server)", color: AMBER },
            { port: 443, proto: "HTTPS", use: "Web traffic (encrypted, TLS)", color: GREEN },
            { port: 3000, proto: "Node.js dev", use: "Common Express dev server default", color: BLUE },
            { port: 3306, proto: "MySQL", use: "MySQL database", color: AMBER },
            { port: 5432, proto: "PostgreSQL", use: "PostgreSQL database", color: AMBER },
            { port: 6379, proto: "Redis", use: "Redis in-memory store", color: RED },
            { port: 8080, proto: "HTTP alt", use: "Alternative HTTP, dev proxies", color: BLUE },
            { port: 27017, proto: "MongoDB", use: "MongoDB database", color: GREEN },
        ];

        return (
            <div>
                <Section title="Port Number Ranges">
                    <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
                        {ranges.map(r => (
                            <div key={r.range} style={{ background: r.bg, border: `1.5px solid ${r.color}`, borderRadius: 8, padding: "12px 16px", display: "flex", gap: 20, alignItems: "center", flexWrap: "wrap" }}>
                                <div style={{ fontFamily: "monospace", fontSize: 14, fontWeight: 700, color: r.color, minWidth: 140 }}>{r.range}</div>
                                <div>
                                    <div style={{ fontWeight: 700, fontSize: 13, color: r.color, fontFamily: "Arial, sans-serif" }}>{r.name}</div>
                                    <div style={{ fontSize: 12, color: GRAY, fontFamily: "Arial, sans-serif", marginTop: 2 }}>{r.desc}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                </Section>

                <Section title="Common Port Numbers" color={BLUE}>
                    <div style={{ border: `1px solid ${BORDER}`, borderRadius: 10, overflow: "hidden" }}>
                        <div style={{ display: "grid", gridTemplateColumns: "80px 160px 1fr", background: "#f0f0f0", padding: "8px 14px", borderBottom: `1px solid ${BORDER}` }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: GRAY, textTransform: "uppercase", letterSpacing: 0.5 }}>Port</div>
                            <div style={{ fontSize: 11, fontWeight: 700, color: GRAY, textTransform: "uppercase", letterSpacing: 0.5 }}>Protocol</div>
                            <div style={{ fontSize: 11, fontWeight: 700, color: GRAY, textTransform: "uppercase", letterSpacing: 0.5 }}>Common Use</div>
                        </div>
                        {ports.map((p, i) => (

                </div>

                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 24, borderBottom: `2px solid ${BORDER}`, paddingBottom: 12 }}>
                    {tabs.map((t, i) => (
                        <button key={t} onClick={() => setTab(i)} style={{ padding: "7px 14px", borderRadius: 6, border: `1.5px solid ${tab === i ? GREEN : BORDER}`, background: tab === i ? GREEN : "#fff", color: tab === i ? "#fff" : GRAY, fontSize: 12, fontWeight: tab === i ? 700 : 400, fontFamily: "Arial, sans-serif" }}>{t}</button>
                    ))}
                </div>

                <View />
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
